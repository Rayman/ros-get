name: Python application

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - '3.10'
          - '3.12'
          - '3.14'
    steps:
      - uses: actions/checkout@v4
      - name: 'Set up Python ${{ matrix.python-version }}'
        uses: actions/setup-python@v5
        with:
          python-version: '${{ matrix.python-version }}'
      - name: 'Install dependencies'
        run: pip install tox tox-gh-actions
      - name: 'Test with tox'
        run: tox
      - name: 'Upload coverage report'
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-report
          path: cobertura.xml
      - uses: casperdcl/deploy-pypi@v2
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags') && matrix.python-version == '3.10'
        with:
          password: ${{ secrets.pypi_token }}
          build: true

  upload-coverage:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cobertura-report
      - uses: actions/upload-code-coverage@v1
        with:
          file: cobertura.xml
          language: Python
          label: code-coverage/pytest
